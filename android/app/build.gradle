plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { net ->
        localProperties.load(net)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    // هذا السطر مهم لـ GitHub Actions إذا لم يجد الملف
    flutterRoot = System.getenv('FLUTTER_ROOT')
}

android {
    namespace "com.example.termin" // استبدلها باسم الحزمة الخاص بتطبيقك إذا كان مختلفاً
    compileSdkVersion 34 // أو استخدم flutter.compileSdkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.example.termin" // استبدلها باسم الحزمة الخاص بتطبيقك
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug // يمكنك تغييره لاحقاً عند إضافة مفتاح توقيع حقيقي
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.7.10"
}
